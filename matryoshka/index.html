      const BOTTOM_FILL_PATH = "M27.750 469.805 C 22.006 470.173,22.129 469.200,25.037 491.134 C 31.299 538.371,47.276 591.726,74.059 654.846 C 83.574 677.269,86.169 681.449,92.487 684.528 C 126.522 701.113,268.657 702.467,301.513 686.518 C 308.974 682.896,314.668 672.014,333.701 625.000 C 359.598 561.027,380.742 472.860,370.750 470.509 C 368.398 469.955,36.036 469.273,27.750 469.805";

      const container = document.getElementById('container');

      let tops = [];
      let currentLevel = 0;

      function createSVG(pathD, fill, fillPathD = null) {
         const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
         svg.setAttribute("viewBox", "0 0 400 700");

         if (fillPathD) {
            const fillPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
            fillPath.setAttribute("d", fillPathD);
            fillPath.setAttribute("fill", "#EED5AE");
            fillPath.setAttribute("stroke", "none");
            svg.appendChild(fillPath);
         }

         const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
         path.setAttribute("d", pathD);
         path.setAttribute("fill", fill);

         svg.appendChild(path);
         return svg;
      }

      function build() {
         const bottoms = [];
         const topsLocal = [];

         for (let i = MAX_LEVELS - 1; i >= 0; i--) {
            const scale = 1 - i * SCALE_STEP;
            const [topColor, bottomColor] = COLORS[i % COLORS.length];

            // bottom (only outermost will be used)
            const bottomWrap = document.createElement('div');
            bottomWrap.className = 'layer';

            const bottomSVG = createSVG(
               BOTTOM_PATH,
               bottomColor,
               BOTTOM_FILL_PATH
            );

            bottomSVG.style.transform = `scale(${scale})`;
            bottomWrap.appendChild(bottomSVG);
            bottoms.push(bottomWrap);

            const topWrap = document.createElement('div');
            topWrap.className = 'layer';

            const topSVG = createSVG(
               TOP_PATH,
               topColor,
               TOP_FILL_PATH
            );

            topSVG.classList.add('top');
            topSVG.style.transform = `scale(${scale})`;
            topWrap.appendChild(topSVG);
            topsLocal.push(topSVG);
         }

         // append tops
         topsLocal.forEach(t => {
            const wrap = document.createElement('div');
            wrap.className = 'layer';
            wrap.appendChild(t);
            container.appendChild(wrap);
         });

         tops = topsLocal.reverse();

         // append ONLY outermost bottom
         const outermostBottom = bottoms[bottoms.length - 1];
         container.appendChild(outermostBottom);
      }

      function openNext() {
         if (currentLevel >= MAX_LEVELS) return;

         const top = tops[currentLevel];
         top.style.transform += ' translateY(-120%)';
         top.style.opacity = '0';

         currentLevel++;
      }

      function closeLast() {
         if (currentLevel <= 0) return;

         currentLevel--;

         const top = tops[currentLevel];
         top.style.transform = top.style.transform.replace(' translateY(-120%)', '');
         top.style.opacity = '1';
      }

      const Actions = {
         OPEN: 'open',
         CLOSE: 'close',
      };

      function handleAction(action) {
         switch (action) {
            case Actions.OPEN:
               openNext();
               break;
            case Actions.CLOSE:
               closeLast();
               break;
         }
      }

      container.addEventListener('click', () => {
         handleAction(Actions.OPEN);
      });

      container.addEventListener('contextmenu', (e) => {
         e.preventDefault();
         handleAction(Actions.CLOSE);
      });

      window.addEventListener('keydown', (e) => {
         if (e.key === 'ArrowUp') handleAction(Actions.OPEN);
         if (e.key === 'ArrowDown') handleAction(Actions.CLOSE);
      });

      build();
   </script>
