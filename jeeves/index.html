<!doctype html>
<html lang="en">
<head>
   <meta charset="utf-8" />
   <title>Ask Jeeves</title>
   <style>
      .page {
         background-color: #5B9BD5;
         color: white;
         padding: 2em;
         margin: 2em;
         font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      }

      body {
         padding: 1em;
      }
   </style>
</head>
<body>
   <p>
      Here is a sample application that accepts user input (press ENTER after your input).
      Attempt to inject some HTML, and then try some script injection.
   </p>
   <div class="page">
      <h1>Ask Jeeves <span style="font-size: small;">(don't waste your time asking Wooster)</span></h1>
      <h3>Your definitive source of knowledge</h3>

      <div style="display: flex;">
         <label for="question" style="padding-right: 12px;">Ask here:</label>
         <input id="question" name="question" type="text" style="flex: 1;" />
      </div>

      <p>You asked: <span id="asked"></span></p>
      <p>Jeeves says the answer is <span id="ans"></span></p>

      <footer>
         <hr style="width: 30%; margin-right: 0px;" />
         <p style="font-size: small; text-align: right;">
            Powered by MVC
         </p>
      </footer>
      <script>
         document.addEventListener("keydown", (ev) => {
            if (ev.key === 'Enter') {
               const q = document.getElementById("question").value;
               document.getElementById("asked").innerHTML = q;
               const answers = [
                  42,
                  "42 (obviously)",
                  "The answer is 42. You asked the wrong question.",
                  "I took the liberty of computing it. The answer is 42.",
                  "42. As expected.",
                  "I took the liberty of computing it. The answer is 42.",
                  "One might reasonably conclude the answer is 42.",
                  "42. Shall I prepare tea?",
                  "42. The difficulty lies in the question, not the answer.",
                  "42. Context, as always, is everything.",
                  "The answer is 42. Interpretation is left as an exercise.",
                  "42... though I suspect we are asking the wrong thing.",
                  "42. Bold of you to ask.",
                  "42. I trust this resolves everything.",
                  "42, I reckon",
                  "42. I shall await your follow-up confusion.",
                  "42. As it has always been.",
                  "42, sir. A triumph of modern reasoning.",
                  "42. One hesitates to imagine the alternatives.",
                  "42. The dolphins were right.",
                  "42. Earth will be demolished shortly."
               ];

               document.getElementById("ans").innerText =
                  answers[Math.floor(Math.random() * answers.length)];
            }
         });
      </script>
   </div>
</body>
</html>
